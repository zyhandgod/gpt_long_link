<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>订阅支付链接生成</title>
<style>
  :root {
    --green: #00b96b;
    --green-hover: #009e5c;
    --green-bg: #f0faf4;
    --green-bg2: #e6f7ee;
    --green-border: #8cd9a8;
    --green-light: rgba(0,185,107,0.08);
    --red: #ff4d4f;
    --red-bg: #fff2f0;
    --bg: #f5f6f8;
    --white: #fff;
    --gray-1: #f9fafb;
    --gray-2: #f3f4f6;
    --gray-3: #e8eaed;
    --gray-5: #c8ccd0;
    --gray-6: #a0a6ad;
    --gray-7: #6b7280;
    --gray-8: #4b5563;
    --gray-9: #1f2937;
    --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
    --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
    --font-code: SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
    --radius: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--gray-9);
    min-height: 100vh;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  .topbar {
    background: var(--white);
    border-bottom: 1px solid var(--gray-3);
    padding: 0 28px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-xs);
  }
  .topbar .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    color: var(--gray-9);
    text-decoration: none;
  }
  .topbar .logo-icon {
    width: 30px; height: 30px;
    background: linear-gradient(135deg, #00c96e, #00a85a);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(0,185,107,0.3);
  }
  .topbar .env-tag {
    font-size: 12px;
    color: var(--gray-6);
    background: var(--gray-2);
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }

  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 36px 24px 72px;
  }

  .page-title {
    margin-bottom: 32px;
  }
  .page-title h1 {
    font-size: 24px;
    font-weight: 700;
    color: var(--gray-9);
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }
  .page-title p {
    font-size: 14px;
    color: var(--gray-7);
  }
  .page-title .divider {
    margin-top: 20px;
    height: 1px;
    background: linear-gradient(90deg, var(--gray-3), transparent);
  }

  .card {
    background: var(--white);
    border: 1px solid var(--gray-3);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 14px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow 0.25s, border-color 0.25s;
  }
  .card:hover {
    box-shadow: var(--shadow-md);
    border-color: var(--gray-5);
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-9);
    margin-bottom: 18px;
    padding-left: 12px;
    border-left: 3px solid var(--green);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--green);
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    padding: 1px 8px;
    border-radius: 10px;
    line-height: 1.6;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-8);
    margin-bottom: 7px;
  }
  textarea, input[type="text"], select {
    width: 100%;
    background: var(--gray-1);
    border: 1px solid var(--gray-3);
    border-radius: 8px;
    color: var(--gray-9);
    font-family: var(--font-code);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    margin-bottom: 16px;
  }
  textarea { resize: vertical; min-height: 94px; font-size: 12px; line-height: 1.7; }
  textarea:focus, input:focus, select:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px var(--green-light);
    background: var(--white);
  }
  textarea::placeholder, input::placeholder { color: #c0c4cc; }
  select {
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%236b7280' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 12px center;
    padding-right: 32px;
  }
  .row { display: flex; gap: 14px; }
  .row > div { flex: 1; }

  .help-text {
    font-size: 12px;
    color: var(--gray-7);
    margin-top: -10px;
    margin-bottom: 14px;
  }
  .help-text a { color: var(--green); text-decoration: none; font-weight: 500; }
  .help-text a:hover { text-decoration: underline; }

  .btn {
    display: inline-flex;
    align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    padding: 12px 24px;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #00c96e, #00a85a);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,185,107,0.25);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, #00b96b, #009e52);
    box-shadow: 0 4px 14px rgba(0,185,107,0.3);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); box-shadow: 0 2px 6px rgba(0,185,107,0.2); }
  .btn-primary:disabled { background: #a8e6c3; box-shadow: none; cursor: not-allowed; transform: none; }

  .result-card {
    display: none;
    background: var(--white);
    border: 1px solid var(--green-border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-top: 18px;
    box-shadow: var(--shadow-sm);
    animation: fadeUp 0.35s ease;
  }
  .result-card.active { display: block; }
  .result-card.error { border-color: var(--red); background: var(--red-bg); }

  .result-card .result-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--gray-3);
  }
  .result-card .result-header .icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 700;
  }
  .result-card .result-header .icon.ok { background: var(--green-bg2); color: var(--green); }
  .result-card .result-header .icon.fail { background: var(--red-bg); color: var(--red); }
  .result-card .result-header h3 { font-size: 15px; font-weight: 600; }

  .link-block {
    background: var(--gray-1);
    border: 1px solid var(--gray-3);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .link-block:hover { border-color: var(--gray-5); }
  .link-block-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .link-block-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
  }
  .link-actions { display: flex; gap: 6px; }
  .link-url-block {
    background: var(--white);
    border: 1px solid var(--gray-3);
    border-radius: 6px;
    padding: 11px 14px;
    font-family: var(--font-code);
    font-size: 12px;
    line-height: 1.7;
    color: var(--green);
    word-break: break-all;
    cursor: pointer;
    transition: all 0.2s;
    user-select: all;
  }
  .link-url-block:hover { background: var(--green-bg); border-color: var(--green-border); }
  .meta-row {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--font-code);
    font-size: 12px;
    color: var(--gray-7);
    margin-top: 4px;
  }
  .meta-key {
    background: var(--gray-2);
    border: 1px solid var(--gray-3);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 500;
  }
  .meta-val { word-break: break-all; }

  .copy-btn {
    background: var(--white);
    border: 1px solid var(--gray-3);
    border-radius: 6px;
    color: var(--gray-7);
    font-size: 12px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: var(--font);
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
    text-decoration: none;
    display: inline-flex; align-items: center;
  }
  .copy-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .copy-btn.copied { background: var(--green); color: #fff; border-color: var(--green); }
  .open-btn { color: var(--green); }

  .error-msg { color: var(--red); font-size: 13px; line-height: 1.7; }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  .notice {
    margin-top: 10px;
    color: var(--gray-7);
    font-size: 12px;
    line-height: 1.7;
    padding: 8px 12px;
    background: var(--gray-1);
    border-radius: 6px;
    border: 1px solid var(--gray-3);
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    .row { flex-direction: column; gap: 0; }
    .link-block-header { flex-direction: column; align-items: flex-start; gap: 8px; }
    .link-actions { width: 100%; }
    .link-actions .copy-btn { flex: 1; justify-content: center; }
    .container { padding: 24px 16px 56px; }
    .topbar { padding: 0 16px; }
    .topbar .env-tag { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="logo" href="/">
    <span class="logo-icon">G</span>
    <span>GPT 支付工具</span>
  </a>
  <span class="env-tag">Stripe Gateway</span>
</div>

<div class="container">
  <div class="page-title">
    <h1>ChatGPT Plus 支付链接生成</h1>
    <p>粘贴 Token，一键生成 Stripe 订阅支付链接</p>
    <div class="divider"></div>
  </div>

  <div class="card">
    <div class="card-title">Access Token <span class="tag">必填</span></div>
    <label>粘贴 Access Token 或完整 Session JSON</label>
    <textarea id="token" placeholder='eyJhbGci... 或粘贴 chatgpt.com/api/auth/session 的完整 JSON'></textarea>
    <p class="help-text">
      在 <a href="https://chatgpt.com/api/auth/session" target="_blank" rel="noreferrer">chatgpt.com/api/auth/session</a> 获取
    </p>
  </div>

  <div class="card">
    <div class="card-title">支付配置</div>
    <div class="row">
      <div>
        <label>账单国家</label>
        <select id="billing_country">
          <option value="ID">ID - 印度尼西亚 (GoPay)</option>
          <option value="US">US - 美国</option>
          <option value="JP">JP - 日本</option>
          <option value="SG">SG - 新加坡</option>
          <option value="DE">DE - 德国</option>
        </select>
      </div>
      <div>
        <label>货币</label>
        <select id="billing_currency">
          <option value="IDR">IDR - 印尼卢比</option>
          <option value="USD">USD - 美元</option>
          <option value="JPY">JPY - 日元</option>
          <option value="SGD">SGD - 新币</option>
          <option value="EUR">EUR - 欧元</option>
        </select>
      </div>
    </div>
    <label style="display:none;">代理 (可选)</label>
    <input type="text" id="proxy" style="display:none;" placeholder="socks5://127.0.0.1:18899 或留空直连">
    <p class="notice">粘贴 Token 后点击生成即可。印尼区可得 GoPay 支付页。</p>
  </div>

  <button class="btn btn-primary" id="genBtn" onclick="generate()">
    生成支付链接
  </button>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="icon" id="resultIcon"></div>
      <h3 id="resultTitle"></h3>
    </div>
    <div id="resultBody"></div>
  </div>
</div>
<script>
// API_BASE 留空代表同源（当页面被 server.py 托管时），否则指向你的后端
const API_BASE = '';
const DEMO_MODE = false;

async function generate() {
  const token = document.getElementById('token').value.trim();
  if (!token) { alert('请粘贴 Access Token'); return; }

  const btn = document.getElementById('genBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 生成中...';

  const resultCard = document.getElementById('resultCard');
  resultCard.classList.remove('active', 'error');

  const payload = {
    token,
    billing_country: document.getElementById('billing_country').value,
    billing_currency: document.getElementById('billing_currency').value,
    proxy: document.getElementById('proxy').value.trim(),
  };

  try {
    let data;
    if (DEMO_MODE) {
      await sleep(650);
      data = buildDemoResponse(payload);
    } else {
      const resp = await fetch((API_BASE || '') + '/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      data = await resp.json();
      if (!resp.ok) {
        const detail = data.detail ? ' | ' + JSON.stringify(data.detail) : '';
        throw new Error((data.error || '请求失败') + detail);
      }
      if (!data.link && !data.links) throw new Error('后端未返回 link/links 字段');
    }
    showLinks(data);
  } catch (e) {
    showError(e.message || String(e));
  }

  btn.disabled = false;
  btn.textContent = '生成支付链接';
}

function buildDemoResponse(payload) {
  const csId = 'cs_test_' + randomId(28);
  return {
    cs_id: csId,
    link: `https://chat.openai.com/backend-api/payments/checkout/${csId}?billing_country=${payload.billing_country}&billing_currency=${payload.billing_currency}`,
  };
}

function showLinks(data) {
  const card = document.getElementById('resultCard');
  const icon = document.getElementById('resultIcon');
  const title = document.getElementById('resultTitle');
  const body = document.getElementById('resultBody');

  icon.className = 'icon ok';
  icon.textContent = '✓';
  title.textContent = '支付链接已生成';
  card.classList.remove('error');
  card.classList.add('active');

  const links = data.links || {};
  const stripeExt = links.stripe_external || data.link || '';
  const chatgptVerify = links.chatgpt_verify || '';
  const openaiFull = links.openai_full || '';

  function linkRow(label, url) {
    if (!url) return '';
    return `
    <div class="link-block" style="margin-bottom:12px;">
      <div class="link-block-header">
        <span class="link-block-label">${label}</span>
        <div class="link-actions">
          <button class="copy-btn" onclick="copyLink(this.closest('.link-block').querySelector('.link-url-block').textContent, this)">复制</button>
          <a class="copy-btn open-btn" href="${url}" target="_blank" rel="noreferrer">打开</a>
        </div>
      </div>
      <div class="link-url-block" title="点击复制" onclick="copyText(this)">${url}</div>
    </div>`;
  }

  body.innerHTML =
    linkRow('Stripe 外部（推荐）', stripeExt) +
    linkRow('ChatGPT 短链', chatgptVerify) +
    linkRow('OpenAI 长链', openaiFull) +
    `<div class="meta-row">
      <span class="meta-key">cs_id</span>
      <span class="meta-val">${escapeHtml(data.cs_id || '-')}</span>
    </div>
    <p class="notice">推荐打开「Stripe 外部」链接进行支付。</p>`;
}

function showError(msg) {
  const card = document.getElementById('resultCard');
  const icon = document.getElementById('resultIcon');
  const title = document.getElementById('resultTitle');
  const body = document.getElementById('resultBody');

  icon.className = 'icon fail';
  icon.textContent = '✗';
  title.textContent = '生成失败';
  card.classList.add('active', 'error');
  body.innerHTML = `<p class="error-msg">${escapeHtml(msg)}</p>`;
}

function copyLink(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function copyText(el) { navigator.clipboard.writeText(el.textContent); }
function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
function randomId(len) {
  const s = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  return Array.from({ length: len }, () => s[Math.floor(Math.random() * s.length)]).join('');
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
}
function escapeAttr(s) {
  return String(s).replace(/[\\']/g, m => m === '\\' ? '\\\\' : "\\'");
}

const SAVE_FIELDS = ['token', 'proxy', 'billing_country', 'billing_currency'];
function saveAll() {
  const d = {};
  SAVE_FIELDS.forEach(id => { const el = document.getElementById(id); if (el) d[id] = el.value; });
  localStorage.setItem('gopay_panel_cfg', JSON.stringify(d));
}
function loadAll() {
  try {
    const d = JSON.parse(localStorage.getItem('gopay_panel_cfg') || '{}');
    SAVE_FIELDS.forEach(id => { const el = document.getElementById(id); if (el && d[id] !== undefined && d[id] !== '') el.value = d[id]; });
  } catch(e) {}
}
loadAll();
SAVE_FIELDS.forEach(id => {
  const el = document.getElementById(id);
  if (el) { el.addEventListener('input', saveAll); el.addEventListener('change', saveAll); }
});

document.getElementById('billing_country').addEventListener('change', function() {
  const map = { ID: 'IDR', US: 'USD', JP: 'JPY', SG: 'SGD', DE: 'EUR' };
  document.getElementById('billing_currency').value = map[this.value] || 'USD';
  saveAll();
});
</script>

</body>
</html>
